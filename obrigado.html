<style>
:root{--black:#050814;--navy:#0B1433;--cyan:#1EDAE2;--purple:#6E58C9;--white:#fff;--muted:#8B95B8;--line:rgba(255,255,255,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px;overflow:hidden;position:relative}
.aura{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(120px)}
.b1{width:46vw;height:46vw;background:var(--purple);top:-12vw;left:-8vw;opacity:.22}
.b2{width:40vw;height:40vw;background:var(--cyan);bottom:-12vw;right:-8vw;opacity:.14}
.card{position:relative;z-index:1;max-width:540px;text-align:center;
  background:linear-gradient(165deg,rgba(11,20,51,.6),rgba(5,8,20,.3));border:1px solid rgba(255,255,255,.12);
  border-radius:26px;padding:48px 40px;box-shadow:0 40px 90px -30px rgba(0,0,0,.85)}
.card img.logo{height:38px;margin-bottom:30px}
.check{width:74px;height:74px;border-radius:50%;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--cyan),var(--purple));color:#04101a;font-size:38px;font-weight:700;
  box-shadow:0 0 0 8px rgba(30,218,226,.10)}
h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(26px,5vw,38px);font-weight:600;letter-spacing:-.02em;line-height:1.1}
h1 .g{background:linear-gradient(100deg,var(--cyan),var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:var(--muted);font-size:16px;line-height:1.6;margin-top:18px}
.actions{margin-top:30px;display:flex;flex-direction:column;gap:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;border-radius:40px;padding:15px 26px;font-weight:600;font-size:15px;text-decoration:none}
.wa{background:#25D366;color:#04140a}
.ghost{border:1px solid rgba(255,255,255,.16);color:#fff}
.wa svg{width:20px;height:20px;fill:currentColor}
</style>
